name: Primeira API

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-pipeline-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t app:ci .

      - name: Executar teste container
        run: docker run --rm app:ci python -m pytest -q tests/

  docker-publish:
    runs-on: ubuntu-latest
    needs: build-pipeline-api
    if: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag imagem docker
        run: docker tag app:ci ${{ secrets.DOCKER_USERNAME }}/app:latest

      - name: Push da imagem Docker
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app:latest
